<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>sudd — Live Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0f0f0f; color: #e0e0e0; font-family: monospace; padding: 20px; }
  h1 { color: #00ff88; margin-bottom: 20px; font-size: 1.5rem; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
  .card { background: #1a1a1a; border: 1px solid #333; border-radius: 8px; padding: 16px; }
  .card h2 { color: #888; font-size: 0.75rem; text-transform: uppercase; margin-bottom: 12px; }
  .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 20px; }
  .stat { background: #1a1a1a; border: 1px solid #333; border-radius: 8px; padding: 12px; text-align: center; }
  .stat .value { font-size: 1.8rem; font-weight: bold; color: #00ff88; }
  .stat .label { font-size: 0.7rem; color: #888; margin-top: 4px; }
  .charts { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
  .chart-card { background: #1a1a1a; border: 1px solid #333; border-radius: 8px; padding: 16px; }
  .chart-card h2 { color: #888; font-size: 0.75rem; text-transform: uppercase; margin-bottom: 12px; }
  button { background: #ff4444; color: white; border: none; padding: 10px 24px; border-radius: 6px; cursor: pointer; font-family: monospace; font-size: 1rem; }
  button:hover { background: #ff6666; }
  .status { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #00ff88; margin-right: 8px; animation: pulse 1s infinite; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
</style>
</head>
<body>
<h1><span class="status"></span>sudd — Live Load Test Dashboard</h1>

<div class="stats">
  <div class="stat"><div class="value" id="rps">0</div><div class="label">RPS</div></div>
  <div class="stat"><div class="value" id="p99">0ms</div><div class="label">p99 Latency</div></div>
  <div class="stat"><div class="value" id="errors">0%</div><div class="label">Error Rate</div></div>
  <div class="stat"><div class="value" id="total">0</div><div class="label">Total Requests</div></div>
</div>

<div class="charts">
  <div class="chart-card">
    <h2>Latency Percentiles (ms)</h2>
    <canvas id="latencyChart"></canvas>
  </div>
  <div class="chart-card">
    <h2>RPS vs Error Rate</h2>
    <canvas id="rpsChart"></canvas>
  </div>
</div>

<button onclick="stopTest()">⏹ Abort Test</button>

<script>
const MAX_POINTS = 60;
const labels = [];

const latencyChart = new Chart(document.getElementById('latencyChart'), {
  type: 'line',
  data: {
    labels,
    datasets: [
      { label: 'p50', data: [], borderColor: '#00ff88', tension: 0.3, pointRadius: 0 },
      { label: 'p95', data: [], borderColor: '#ffaa00', tension: 0.3, pointRadius: 0 },
      { label: 'p99', data: [], borderColor: '#ff4444', tension: 0.3, pointRadius: 0 },
    ]
  },
  options: { animation: false, scales: { x: { display: false }, y: { beginAtZero: true } }, plugins: { legend: { labels: { color: '#888' } } } }
});

const rpsChart = new Chart(document.getElementById('rpsChart'), {
  type: 'line',
  data: {
    labels,
    datasets: [
      { label: 'RPS', data: [], borderColor: '#00ff88', tension: 0.3, pointRadius: 0, yAxisID: 'y' },
      { label: 'Error %', data: [], borderColor: '#ff4444', tension: 0.3, pointRadius: 0, yAxisID: 'y1' },
    ]
  },
  options: {
    animation: false,
    scales: {
      x: { display: false },
      y: { beginAtZero: true, position: 'left' },
      y1: { beginAtZero: true, position: 'right', max: 100 }
    },
    plugins: { legend: { labels: { color: '#888' } } }
  }
});

function push(chart, ...values) {
  values.forEach((v, i) => chart.data.datasets[i].data.push(v));
  if (chart.data.labels.length > MAX_POINTS) {
    chart.data.labels.shift();
    chart.data.datasets.forEach(d => d.data.shift());
  }
  chart.update();
}

const ws = new WebSocket('ws://' + location.host + '/ws');
ws.onmessage = (e) => {
  const d = JSON.parse(e.data);
  document.getElementById('rps').textContent = d.rps.toFixed(1);
  document.getElementById('p99').textContent = d.p99 + 'ms';
  document.getElementById('errors').textContent = d.error_rate.toFixed(2) + '%';
  document.getElementById('total').textContent = d.total_requests;

  const t = new Date(d.timestamp * 1000).toLocaleTimeString();
  latencyChart.data.labels.push(t);
  rpsChart.data.labels.push(t);
  push(latencyChart, d.p50, d.p95, d.p99);
  push(rpsChart, d.rps, d.error_rate);
};

function stopTest() {
  fetch('/api/stop', { method: 'POST' });
}
</script>
</body>
</html>
